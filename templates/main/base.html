{% load static %}

<html>
	<head>
		<link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
	</head>
	<head lang="en">
		<meta charset="UTF-8" />
		<title>
			GUR - 
			{% block title_block %}
				Glasgow University Recipes	
			{% endblock %}
		</title>
	</head>
	<body>
		<div class="sidebar-wrapper">
        
        <nav class="sidebar">
            <div class="logo-box"><img src="{% static 'images/logo.png' %}" alt="GUR Logo" /></div>
            {% if user.is_authenticated and user.userprofile %}
				<a href="{% url 'GUR:view_user' user.userprofile.id %}" class="profile-link-button">My Profile</a>
			{% endif %}

            <div class="navigation-link-button">
                <a href="{% url 'GUR:home' %}">Home</a>
                <a href="{% url 'GUR:search' %}">Search</a>
                
                {% if user.is_authenticated %}
                    <a href="{% url 'GUR:upload' %}">Upload</a>
                    
                    <a href="{% url 'GUR:logout' %}">Logout</a>
                {% else %}
                    <a href="{% url 'GUR:register' %}">Sign Up</a>
                    <a href="{% url 'GUR:login' %}">Login</a>
                {% endif %}
            </div>
        </nav>

        <main class="content-wrapper">
            {% block body_block %}
            {% endblock %}
        </main>
        
    </div>

	</body>
</html>
