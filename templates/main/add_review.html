{% extends 'main/base.html' %}

{% block body_block %}  <div class="container">
        <h1>Reviewing: {{ recipe.name }}</h1>
        
        <form method="post">

            {% csrf_token %}

            <p>Rating: {{ form.rating }}</p>

            <p>
                Description: <br />
                <textarea name="description" placeholder="Share what you think about this recipe..."
                        style="width: 100%; min-height: 350px; border: 1px solid #000; padding: 15px; resize:none; box-sizing: border-box;"></textarea>
            </p>


            <div style="display: flex; justify-content: flex-end; align-items: center; gap: 20px; margin-top: 20px;">
                <a href="{% url 'GUR:view_recipe' recipe.slug %}">Cancel</a>

                <button type="submit" class="profile-link-button" style="margin-bottom: 0">
                    Post Review
                </button>
          
            </div>

        </form>
        
    </div>
{% endblock %}
